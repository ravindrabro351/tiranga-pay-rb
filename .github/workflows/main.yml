name: Build Signed Tiranga Pay APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create Capacitor Android project
        run: |
          mkdir apk-build
          cd apk-build

          npm init -y

          npm install \
            @capacitor/core@7.6.4 \
            @capacitor/cli@7.6.4 \
            @capacitor/android@7.6.4

          mkdir www

          cat > www/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">

            <meta
              name="viewport"
              content="width=device-width, initial-scale=1, viewport-fit=cover"
            >

            <title>Tiranga Pay</title>

            <style>
              html,
              body,
              iframe {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                border: 0;
                overflow: hidden;
                background: #ffffff;
              }
            </style>
          </head>

          <body>
            <iframe
              src="https://tiranga-pay-rb-user.web.app"
              allow="camera; microphone; clipboard-read; clipboard-write"
            ></iframe>
          </body>
          </html>
          EOF

          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.tirangapay.app",
            "appName": "Tiranga Pay",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "allowNavigation": [
                "tiranga-pay-rb-user.web.app",
                "*.firebaseapp.com",
                "*.googleapis.com",
                "*.google.com"
              ]
            }
          }
          EOF

          npx cap add android

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" \
            | base64 --decode \
            > apk-build/tirangapay-release.jks

          if [ ! -s apk-build/tirangapay-release.jks ]; then
            echo "Keystore file could not be restored."
            exit 1
          fi

          echo "Keystore restored successfully."

      - name: Verify release keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keytool -list \
            -keystore apk-build/tirangapay-release.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS"

          echo "Keystore password and alias are valid."

      - name: Build unsigned release APK
        run: |
          cd apk-build/android

          chmod +x gradlew

          ./gradlew clean assembleRelease

      - name: Sign release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          BUILD_TOOLS_VERSION=$(
            ls -1 "$ANDROID_HOME/build-tools" |
            sort -V |
            tail -n 1
          )

          ZIPALIGN="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign"
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"

          UNSIGNED_APK="apk-build/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="apk-build/android/app/build/outputs/apk/release/TirangaPay-release-aligned.apk"
          SIGNED_APK="apk-build/android/app/build/outputs/apk/release/TirangaPay-release.apk"

          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "Unsigned release APK was not found."
            find apk-build/android/app/build/outputs -type f
            exit 1
          fi

          "$ZIPALIGN" \
            -f \
            -p \
            4 \
            "$UNSIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" sign \
            --ks "$GITHUB_WORKSPACE/apk-build/tirangapay-release.jks" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEYSTORE_PASSWORD \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            "$SIGNED_APK"

          echo "Signed release APK created successfully."

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: TirangaPay-Signed-Release-APK
          path: apk-build/android/app/build/outputs/apk/release/TirangaPay-release.apk
          retention-days: 30
